# US-103 (Epic F, ADR-0005): the kit's DEFAULT gate declaration.
#
# This file is the buyer-authored home for the eval gate's project bindings — the
# cells to gate, the cross-family judge map, and the threshold constants that
# `evals/retrieval/ragas_gates.py` used to hardcode. The detection ALGORITHMS
# (fixed floors, rolling-median drift, cross-family corroboration, single-judge-
# red, severity, auto_close_weeks) are unchanged; only these *bindings* are
# declarative, so a buyer describes THEIR eval shape without forking the detector.
#
# The values below reproduce today's `ragas_gates` constants EXACTLY, so shipping
# this default declaration is byte-identical to the legacy hardcoded gate (the
# US-103 regression guard, pinned by `evals/gate/test_gate_bindings.py`). A buyer
# ships their own gate.yaml beside their golden set and edits these values.
#
# The `suites:` and `verdicts:` sections (US-102/US-104) are intentionally OMITTED
# here: every quality SUITE then takes its `comment` default (the shipped PR
# comment-only posture), and the security invariants (E4/E6/AU4/E7-P1b) are pinned
# `fail` and carry no knob at all — a verdict on one is a hard load error (silence
# only by deletion). See `evals/gate/declaration.py`.
#
# US-104 loudness knobs (per QUALITY SUITE — `off|comment|fail` over the existing
# red/yellow severity; `fail` => red blocks / yellow comments, `comment` => both
# comment, `off` => silent). Uncomment to change loudness WITHOUT touching the
# detector. The two postures the repo already ships are two values of this knob:
# the weekly red->exit-non-zero posture is `fail`; the PR comment-only posture is
# `comment`. `false_resolve`'s ceiling breach is a pinned invariant and ignores
# this knob (it always fails). A finer per-OUTPUT override may still be set under
# `verdicts:` (e.g. `answer_relevancy: comment`) and wins over its suite's knob.
#
# suites:
#   retrieval_metrics: comment   # recall@k / mrr / ndcg
#   ragas: fail                  # the four RAGAS scores + coverage gates
#   escalation: comment          # deflection / false_escalate (NOT the ceiling)
#
# US-105 per-PR merge-blocking placement (the DETERMINISM axis, orthogonal to the
# loudness knob above). `per_pr:` names the DETERMINISTIC quality gates whose `fail`
# blocks the merge on the per-PR workflow. Only deterministic gates may appear - the
# retrieval-metrics suite / recall@k / mrr / ndcg. A NON-deterministic (LLM-judged)
# gate here - `ragas`, `escalation`, or an output like `faithfulness` - is a hard
# load error: a judge wobble must never red-bar an innocent merge, so those run
# scheduled-only (fail the weekly workflow + file an issue, never block a merge).
# The security invariants (E4/E6/AU4/E7-P1b) already block per-PR through their own
# binary asserts and carry no knob - they must not appear here. Omitted by default,
# so no quality gate blocks the merge via config (today's advisory-per-PR posture).
#
# per_pr:
#   retrieval_metrics: fail      # recall@k / mrr / ndcg may hard-block a PR
#   # recall_at_5: fail          # or opt in a single deterministic output
#   # ragas: fail                # REJECTED - non-deterministic, scheduled-only

bindings:
  # The cells the RAGAS gates run over — today the two pre_filter cells that carry
  # new RAGAS signal (`ragas.RAGAS_CELL_IDS`). Buyer-defined: list YOUR cells here.
  cells:
    - "full_access:pre_filter"
    - "partial_access:pre_filter"

  # Fixed operational floors + rolling-window parameters. Reproduce the FR-8/9/10
  # constants: coverage floor 0.96, API-error ceiling 2, 5pp drift band, a 0.05
  # RAGAS-drop trigger, and the minimum snapshot windows the drift/score gates need.
  thresholds:
    coverage_floor: 0.96
    api_error_ceiling: 2
    coverage_drift_pp: 0.05
    ragas_drop: 0.05
    min_drift_history: 3
    min_regression_history: 4

  # Cross-family corroboration (OPTIONAL). The RAGAS scores are judged by the
  # OpenAI family (gpt-4o-mini — the same family as the answer generator); the
  # independent corroborating judge is the Claude/Anthropic family. Because the
  # two families DIFFER, corroboration is enabled: a RAGAS drop the Claude judge
  # confirms in the same cell escalates to red, while an uncorroborated drop stays
  # yellow. `context_precision` / `context_recall` have no entry here, so they fire
  # single-judge-red on a RAGAS drop.
  #
  # Omit this whole block — or set judge_family == generator_family — to run
  # single-family: every RAGAS drop then degrades to single-judge-red (a weaker,
  # non-independent proof; see US-109). The judge_cell must be one of the `cells`
  # above, each judge_equivalent key must be a real RAGAS metric, and each
  # judge_metric value must name a Claude judge metric (`faithfulness` or
  # `helpfulness`) — a typo in any of them is a hard load error, never a silent skip.
  #
  # NOTE: unlike `cells` and `thresholds`, corroboration is NOT inherited from the
  # default when omitted. A custom `bindings:` block that leaves this block out
  # runs single-family / single-judge-red - re-declare the whole `corroboration:`
  # block here to keep cross-family corroboration.
  corroboration:
    generator_family: openai
    judge_family: anthropic
    judge_cell: "full_access:pre_filter"
    judge_equivalent:
      faithfulness:
        judge_metric: faithfulness
        drop: 0.3
      answer_relevancy:
        judge_metric: helpfulness
        drop: 0.2
