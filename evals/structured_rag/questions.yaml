# US-031: 30 hand-authored questions for the structured-RAG eval.
#
# Distribution per the PRD:
#   - 15 metric-ambiguity     (q01-q15) — naive text-to-SQL misfires on the
#                              metric definition; semantic resolves via the
#                              named metric in the YAML.
#   - 9  join/dimension       (q16-q24) — requires joining customers/orders/
#                              order_items/products through the semantic
#                              layer's join graph.
#   - 6  time-grain/filter    (q25-q30) — date_trunc bucketing or BETWEEN /
#                              status filters.
#
# The questions are intentionally varied in surface form so the planner's
# synonym handling is exercised: "revenue", "sales", "billed amount" all
# point at gross_revenue; "net of refunds", "take-home", "earnings" point at
# net_revenue, etc.

