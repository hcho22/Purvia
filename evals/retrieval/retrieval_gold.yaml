# US-033: golden set for the retrieval eval.
#
# 50 questions across four categories, distributed per the PRD: 20 single_chunk,
# 15 multi_hop, 10 adversarial, 5 paraphrase. Each question references one or
# more chunks by `stable_id` (US-032 schema: "{filename_slug}:{chunk_index}").
#
# Authoring process: drafted by Claude Opus (mirroring the PRD's "LLM-drafted
# + human-edited" methodology — GPT-4o was the PRD's example, but the LLM
# family doesn't matter as long as it's a different family from the embedder)
# against the 14 chunks produced by db_seed.corpus_seed at 500/50 default
# tokenisation. The adversarial-question filter step (running each candidate
# through current retrieval and keeping only those where ≥1 mode fails) is
# the user-side step once the runner produces real numbers — until then,
# these 10 adversarials are candidates ranked by how cleanly they construct a
# lexical-vs-semantic divergence.
#
# Field semantics:
#   id              — qNN, sequential, never reused
#   category        — single_chunk | multi_hop | adversarial | paraphrase
#   question        — the natural-language query passed to retrieval
#   gold_stable_ids — list of one or more chunk stable_ids; recall@k counts
#                     each gold chunk that appears in top_k (partial credit)
#   notes           — optional authoring rationale; not consumed by the runner

questions:
  # ── single_chunk (20) ─────────────────────────────────────────────────
  - id: q01
    category: single_chunk
    question: What's the standard shipping window for domestic orders?
    gold_stable_ids: [shipping-faq:0]
    notes: standard shipping = 3–5 business days in contiguous US

  - id: q02
    category: single_chunk
    question: How long is the electronics warranty?
    gold_stable_ids: [warranty-terms:0]

  - id: q03
    category: single_chunk
    question: What is the SKU format used in the product catalog?
    gold_stable_ids: [product-catalog:0]
    notes: CAT-NNNN with three-letter category prefix

  - id: q04
    category: single_chunk
    question: What is the refund eligibility window after the shipped_at date?
    gold_stable_ids: [refund-policy:0]
    notes: 30 days from shipped_at

  - id: q05
    category: single_chunk
    question: What's the spend threshold for Gold loyalty tier?
    gold_stable_ids: [loyalty-program:0]

  - id: q06
    category: single_chunk
    question: Which carriers handle standard domestic shipping?
    gold_stable_ids: [shipping-faq:0]

  - id: q07
    category: single_chunk
    question: What's the return shipping fee for items between 5 and 20 pounds?
    gold_stable_ids: [returns-process:0]
    notes: $14.95

  - id: q08
    category: single_chunk
    question: What return rate triggers a quality review by the merchandising team?
    gold_stable_ids: [returns-process:1]
    notes: 8% over trailing 90 days

  - id: q09
    category: single_chunk
    question: What's the warranty window for printing defects on books?
    gold_stable_ids: [warranty-terms:0]

  - id: q10
    category: single_chunk
    question: What's the response time target for live chat support?
    gold_stable_ids: [customer-service-sop:0]
    notes: 60 seconds during business hours

  - id: q11
    category: single_chunk
    question: How long is the warranty on home goods?
    gold_stable_ids: [warranty-terms:0]
    notes: 6 months

  - id: q12
    category: single_chunk
    question: When does the cancellation cutoff occur after payment?
    gold_stable_ids: [returns-process:0]
    notes: when the order enters fulfillment-processing — 2–4 hrs weekdays, 24 hrs weekends

  - id: q13
    category: single_chunk
    question: How long does a refund take to settle on a credit card?
    gold_stable_ids: [refund-policy:0]
    notes: 5–7 business days

  - id: q14
    category: single_chunk
    question: Where is the fulfillment center that dispatches our shipments?
    gold_stable_ids: [shipping-faq:0]
    notes: Ohio

  - id: q15
    category: single_chunk
    question: What gross margin range does Acme Co target across categories?
    gold_stable_ids: [product-catalog:0]
    notes: 30–50%

  - id: q16
    category: single_chunk
    question: How is an active customer defined for tier purposes?
    gold_stable_ids: [loyalty-program:1]
    notes: last_order_at within trailing 90 days

  - id: q17
    category: single_chunk
    question: What carrier do we use for international shipping to most destinations?
    gold_stable_ids: [shipping-faq:0]
    notes: DHL Express

  - id: q18
    category: single_chunk
    question: How long is the apparel warranty?
    gold_stable_ids: [warranty-terms:0]
    notes: 90 days

  - id: q19
    category: single_chunk
    question: What annual store credit do Platinum members receive?
    gold_stable_ids: [loyalty-program:0]
    notes: $100 on program anniversary

  - id: q20
    category: single_chunk
    question: What identity verification is required for a refund above $100?
    gold_stable_ids: [customer-service-sop:0]
    notes: last four digits of payment method or a recent order number

  # ── multi_hop (15) ────────────────────────────────────────────────────
  - id: q21
    category: multi_hop
    question: What's the expedited warranty replacement workflow for a Gold-tier customer with a defective home goods item?
    gold_stable_ids: [loyalty-program:0, warranty-terms:1]
    notes: Gold benefit (loyalty:0) + expedited replacement details with payment-method hold (warranty:1)

  - id: q22
    category: multi_hop
    question: Can a Platinum customer use the goodwill refund exception 55 days after their order shipped?
    gold_stable_ids: [loyalty-program:0, refund-policy:0]
    notes: Platinum tier exists (loyalty:0) + goodwill exception 60-day window for Gold/Platinum (refund:0)

  - id: q23
    category: multi_hop
    question: What's the chain of events when a worn apparel item is returned with its original packaging intact?
    gold_stable_ids: [returns-process:1, warranty-terms:0]
    notes: partial-pass inspection 50–80% refund (returns:1) + apparel wear-and-tear not covered (warranty:0)

  - id: q24
    category: multi_hop
    question: What happens if an electronics SKU shows a 22% return rate over the trailing quarter?
    gold_stable_ids: [returns-process:1, product-catalog:1]
    notes: 8% threshold + de-list pending review (returns:1) + electronics category context (product:1)

  - id: q25
    category: multi_hop
    question: What's the SOP for handling a customer requesting a $700 refund 50 days after their order shipped?
    gold_stable_ids: [customer-service-sop:0, refund-policy:0]
    notes: escalation trigger above $500 outside 30-day (sop:0) + goodwill 50% cap unless escalated (refund:0)

  - id: q26
    category: multi_hop
    question: If a Silver-tier customer places a $40 order, what shipping cost and timing apply?
    gold_stable_ids: [loyalty-program:0, shipping-faq:0]
    notes: Silver free shipping over $25 (loyalty:0) + 3–5 business day window (shipping:0)

  - id: q27
    category: multi_hop
    question: How does the order's shipped_at timestamp affect refund eligibility?
    gold_stable_ids: [shipping-faq:0, refund-policy:0]
    notes: shipped_at set at carrier scan (shipping:0) + 30-day refund window keyed off shipped_at (refund:0)

  - id: q28
    category: multi_hop
    question: What's the inspection-and-refund flow for a damaged-in-transit electronics order?
    gold_stable_ids: [returns-process:1, refund-policy:0]
    notes: inspection outcomes (returns:1) + damaged-in-transit = full refund + free return shipping (refund:0)

  - id: q29
    category: multi_hop
    question: How does the loyalty-tier grace period interact with the monthly tier recalculation and active-customer metric?
    gold_stable_ids: [loyalty-program:0, loyalty-program:1]
    notes: monthly recalc (loyalty:0) + grace period + active customer (loyalty:1)

  - id: q30
    category: multi_hop
    question: How is an active-hours fraud report handled after the phone line closes for the day?
    gold_stable_ids: [customer-service-sop:0, customer-service-sop:1]
    notes: phone reserved for fraud (sop:0) + on-call supervisor queue after hours (sop:1)

  - id: q31
    category: multi_hop
    question: What's required from the customer when a glassware item arrives broken, and what refund amount applies?
    gold_stable_ids: [warranty-terms:0, refund-policy:0]
    notes: home goods covers glassware breakage, photo required, don't return (warranty:0) + damaged-in-transit full refund (refund:0)

  - id: q32
    category: multi_hop
    question: Why might SUM(unit_price * quantity) on order_items differ from SUM(products.list_price * quantity), and which should be used for reporting revenue?
    gold_stable_ids: [product-catalog:0, product-catalog:1]
    notes: unit_price snapshot ±10% drift (product:0) + use order_items for gross revenue (product:1)

  - id: q33
    category: multi_hop
    question: What's the difference between the cancellation cutoff and the refund eligibility window?
    gold_stable_ids: [returns-process:0, refund-policy:0]
    notes: cancellation 2–4 hours after paid_at (returns:0) + refund 30 days from shipped_at (refund:0)

  - id: q34
    category: multi_hop
    question: How are international import duties handled when an international order is later refunded?
    gold_stable_ids: [shipping-faq:0, refund-policy:1]
    notes: duties at customer's expense (shipping:0) + refunds don't include original shipping (refund:1)

  - id: q35
    category: multi_hop
    question: What benefits does a customer lose immediately if they close their Platinum account?
    gold_stable_ids: [loyalty-program:0, loyalty-program:1]
    notes: Platinum benefits incl. $100 credit (loyalty:0) + close-account loses all tier benefits (loyalty:1)

  # ── adversarial (10) ──────────────────────────────────────────────────
  - id: q36
    category: adversarial
    question: What's the deadline to cancel my order?
    gold_stable_ids: [returns-process:0]
    notes: |
      Lexical trap: refund-policy:0 mentions "eligibility window" / "30 days"
      / "deadline-flavour" keywords. Correct answer is the cancellation cutoff
      (2–4 hours after paid_at) in returns-process:0.

  - id: q37
    category: adversarial
    question: How should I compute revenue from product list prices?
    gold_stable_ids: [product-catalog:1]
    notes: |
      Lexical trap: product-catalog:0 defines "list_price" and pricing
      conventions in detail. The actual guidance — "sum unit_price *
      quantity from order_items rather than recomputing from products.list_price"
      — is in product-catalog:1.

  - id: q38
    category: adversarial
    question: What discount do Platinum members get?
    gold_stable_ids: [loyalty-program:0]
    notes: |
      Lexical trap: refund-policy:0/:1 mention discount-flavour terms
      (partial refunds, percentages); product-catalog mentions promotional
      discounts and order-level discounts. Correct answer is the 10% loyalty
      discount in loyalty-program:0.

  - id: q39
    category: adversarial
    question: If my book arrives damaged in transit, what's my recourse?
    gold_stable_ids: [refund-policy:0]
    notes: |
      Lexical trap: warranty-terms:0 has the "books — 30-day printing
      defects" line that lexically matches "book" + "damaged". Damaged in
      transit goes through refund-policy:0 (damaged-in-transit = full refund,
      free return shipping), regardless of warranty.

  - id: q40
    category: adversarial
    question: How quickly do you respond to my messages?
    gold_stable_ids: [customer-service-sop:0]
    notes: |
      Lexical trap: shipping-faq mentions "respond" / response-flavour terms
      around tracking and updates. Correct answer is the response-time
      targets table in customer-service-sop:0 (phone 90s, chat 60s, email
      4 business hours).

  - id: q41
    category: adversarial
    question: When will my package leave the warehouse?
    gold_stable_ids: [shipping-faq:0]
    notes: |
      Lexical trap: returns-process:0 mentions "warehouse" (unauthorised
      returns refused at warehouse). Correct answer is shipping-faq:0
      dispatch description (Ohio fulfillment center, same-day under 2 PM
      for expedited).

  - id: q42
    category: adversarial
    question: Do you charge a restocking fee on returns?
    gold_stable_ids: [refund-policy:0]
    notes: |
      Lexical trap: returns-process:0 has explicit return fees ($7.95, $14.95)
      and discusses fee-flavour topics. The actual answer is in refund-policy:0
      — "Restocking fees do not apply at Acme Co; we do not deduct from the
      refund amount for handling."

  - id: q43
    category: adversarial
    question: Do you sell coffee subscriptions?
    gold_stable_ids: [product-catalog:1]
    notes: |
      Lexical trap: loyalty-program:0 references "Subscription-style orders
      follow the Loyalty Program cancellation rules" (subscription appears
      explicitly). Correct answer is product-catalog:1 — Food category,
      subscription-style food orders (granola, coffee, tea) covered in a
      separate runbook.

  - id: q44
    category: adversarial
    question: What's the cancellation policy for my subscription?
    gold_stable_ids: [loyalty-program:1]
    notes: |
      Lexical trap: returns-process:0 has a "Cancellation vs Return" section.
      Correct answer is the loyalty-program:1 cancellation/tier-preservation
      section, which is the subscription-cancellation context for Acme Co's
      subscription-style orders.

  - id: q45
    category: adversarial
    question: What's the trailing 12-month spend window used for tier qualification?
    gold_stable_ids: [loyalty-program:0]
    notes: |
      Lexical trap: customer-service-sop:0 escalation triggers reference a
      "trailing 6 months" window for refund frequency. Correct answer is
      loyalty-program:0 — trailing 12-month spend determines tier.

  # ── paraphrase (5) ────────────────────────────────────────────────────
  - id: q46
    category: paraphrase
    question: Who pays for return postage when I change my mind?
    gold_stable_ids: [returns-process:0]
    notes: |
      Out-of-vocab: "postage" → corpus uses "shipping"; "change my mind" →
      corpus uses "customer changed their mind" / "customer no longer needs
      the item". Answer: customer pays ($7.95 under 5lb, etc.).

  - id: q47
    category: paraphrase
    question: If I paid by ACH transfer, when will I see my money back?
    gold_stable_ids: [refund-policy:0]
    notes: |
      Out-of-vocab: "ACH transfer" → corpus uses "bank transfer". Answer:
      3–5 business days for bank transfer in refund-policy:0.

  - id: q48
    category: paraphrase
    question: If a customer mentions their complaint on Twitter or Trustpilot, what's the agent's playbook?
    gold_stable_ids: [customer-service-sop:1]
    notes: |
      Out-of-vocab: "Twitter" / "Trustpilot" → corpus uses "social media,
      Trustpilot, etc." (Trustpilot does appear) and "negative reviews".
      Answer: don't request review removal in exchange for resolution.

  - id: q49
    category: paraphrase
    question: What happens to a product's discoverability on the storefront when too many people send it back?
    gold_stable_ids: [returns-process:1]
    notes: |
      Out-of-vocab: "discoverability" → corpus uses "de-listed from the
      storefront"; "send it back" → corpus uses "returned" / "returns".
      Answer: SKU placed on quality review may be temporarily de-listed.

  - id: q50
    category: paraphrase
    question: Are digital gift vouchers eligible for cash-back?
    gold_stable_ids: [refund-policy:1]
    notes: |
      Out-of-vocab: "digital gift vouchers" → corpus uses "gift cards";
      "cash-back" → corpus uses "refundable". Answer: gift cards are not
      refundable.
