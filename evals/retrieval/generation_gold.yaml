# US-036: reference answers for each question in retrieval_gold.yaml.
#
# The judge sees: the question, the chunks retrieved by the mode being
# evaluated, the AI-generated answer, AND this reference answer. The
# reference is the hand-authored "ideal" — it's what scores faithfulness
# (does the answer stay grounded in the retrieved context?) and
# helpfulness (does the answer match the substance of the reference?).
#
# Authoring: drafted by hand against the actual chunk contents. Kept tight
# (1–3 sentences typical) and factually grounded — references should be
# things a competent agent could write from the corpus, not aspirational
# elaborations.

answers:
  q01: |
    Standard shipping takes 3–5 business days within the contiguous US,
    dispatched from our Ohio fulfillment center. It's free for orders over
    $50; smaller orders pay carrier-calculated fees. Rural ZIPs may add
    1–2 days, and PO boxes aren't supported.

  q02: |
    Electronics carry a 12-month limited warranty against manufacturing
    defects, starting from the order's shipped_at date. Coverage includes
    component failure, battery capacity dropping below 70% of rated, and
    firmware issues that can't be fixed by a factory reset.

  q03: |
    SKUs use the format CAT-NNNN — a three-letter category prefix (ELE for
    electronics, APP for apparel, HOM for home, BOO for books, FOO for
    food) followed by a four-digit zero-padded sequence number. SKUs are
    never reused.

  q04: |
    Customers may request a refund within 30 days of the order's
    shipped_at date. The window cannot be reopened by customer service
    except under the goodwill exception (e.g., loyalty-tier customers
    get up to 60 days).

  q05: |
    Gold tier requires trailing 12-month spend of $1,000 or more,
    calculated as the sum of orders.total minus refunds.amount for orders
    in paid, shipped, or refunded status.

  q06: |
    Standard domestic shipping uses USPS or UPS Ground depending on
    package weight. The specific carrier is recorded in the fulfillment
    system but is not exposed on the orders table.

  q07: |
    For change-of-mind returns weighing 5–20 lbs, the return shipping fee
    is $14.95, deducted from the refund or charged to the original
    payment method.

  q08: |
    SKUs with a trailing-90-day return rate above 8% are flagged to the
    merchandising team for quality review. Flagged SKUs may be temporarily
    de-listed from the storefront pending investigation.

  q09: |
    Books carry a 30-day warranty against printing defects — missing
    pages, blurred ink, or binding failure. Beyond 30 days, book warranty
    claims are at customer service's discretion.

  q10: |
    Live chat targets a first response within 60 seconds during business
    hours (Mon–Fri 8 AM – 8 PM Eastern).

  q11: |
    Home goods carry a 6-month warranty against manufacturing defects,
    starting from shipped_at. Coverage includes joint failure, glassware
    breakage during normal household use, and fabric defects on
    upholstered items.

  q12: |
    Cancellation is available until the order enters fulfillment-
    processing — typically 2–4 hours after paid_at on weekdays, up to
    24 hours on weekends. After shipped_at is set, cancellation is no
    longer possible; the customer must request a return instead.

  q13: |
    Card refunds typically settle in 5–7 business days. Bank transfers
    take 3–5 business days. Store credit is available immediately.

  q14: |
    Acme Co dispatches from a fulfillment center in Ohio.

  q15: |
    Gross margin typically lands in the 30–50% range, with cost running
    50–70% of list price across product categories.

  q16: |
    For tier purposes, an "active customer" is one whose last_order_at
    falls within the trailing 90 days. Inactive customers retain their
    tier through the next recalculation but aren't counted in the monthly
    active-customer metric.

  q17: |
    International orders to most destinations ship via DHL Express. Select
    countries use EMS instead.

  q18: |
    Apparel carries a 90-day warranty against stitching defects, fabric
    defects, and dye-fastness issues, starting from shipped_at. Wear-and-
    tear, washing-related fading, and third-party alterations are not
    covered.

  q19: |
    Platinum members receive an annual $100 store credit, issued on the
    customer's program anniversary.

  q20: |
    For refunds above $100 or any goodwill exception, agents must verify
    the customer's identity by confirming name and email plus either the
    last four digits of the payment method on file or a recent order
    number.

  q21: |
    Gold tier members may request expedited warranty replacement for
    apparel, home goods, and books — but not electronics. The replacement
    ships before the defective item is received, conditional on a hold on
    the customer's original payment method, which is released when the
    defective item arrives at the returns center.

  q22: |
    Yes — the goodwill refund exception applies to Gold and Platinum
    loyalty members for up to 60 days after shipped_at. The refund is
    capped at 50% of the order total unless escalated to a supervisor.

  q23: |
    Worn apparel returned with original packaging would receive a
    partial-pass inspection: usable but not resaleable, refunded at 50–80%
    of original price. Apparel wear-and-tear is not covered by warranty,
    so no further coverage applies.

  q24: |
    A return rate above 8% triggers quality review by the merchandising
    team and possible temporary de-listing from the storefront pending
    investigation. Electronics is the highest-AOV category, so a 22% rate
    would be flagged and the SKU likely removed pending review.

  q25: |
    This case requires escalation to a supervisor — the refund is above
    $500 AND outside the 30-day window. Goodwill refunds outside the
    window are normally capped at 50% of the order total unless explicitly
    approved by a supervisor.

  q26: |
    Silver members get free standard shipping on orders over $25, so the
    $40 order ships free. Standard shipping is 3–5 business days within
    the contiguous US.

  q27: |
    The shipped_at timestamp is set when the carrier scans the package at
    the fulfillment center, not at label generation. The 30-day refund
    eligibility window starts from this shipped_at date — so any dispute
    about refund deadlines turns on when the carrier scan actually
    happened.

  q28: |
    Damaged-in-transit cases get a full refund plus free return shipping
    (Acme Co's fault, not the customer's). The returned electronics still
    go through inspection at the returns center, but damaged items are
    accepted regardless of completeness for this case.

  q29: |
    Tier is recalculated on the first of each calendar month. If a
    customer drops below their threshold by less than 10%, they keep their
    tier for one additional month as a grace period (once per calendar
    year). The active-customer metric counts only those with last_order_at
    within the trailing 90 days; tier and activity are tracked
    independently.

  q30: |
    Phone is reserved for active fraud reports during business hours.
    After 8 PM Eastern (and on weekends), active fraud reports route to
    the on-call supervisor via a separate escalation queue, distinct from
    the standard email/skeleton-team after-hours coverage.

  q31: |
    A photo of the broken glassware is required; the customer does not
    return the broken piece (asked to dispose of it safely). The case
    qualifies as damaged-in-transit, so a full refund applies.

  q32: |
    unit_price on order_items is a ±10% snapshot of list_price taken at
    order time (promotional drift, per-customer pricing). For accurate
    gross-revenue reporting, sum unit_price * quantity from order_items
    rather than recomputing from products.list_price — the latter can
    diverge meaningfully from what customers actually paid.

  q33: |
    Cancellation is available for 2–4 hours after paid_at on weekdays (up
    to 24 hours on weekends) — before the order enters fulfillment
    processing. Refunds operate on a 30-day window after shipped_at. The
    two windows don't overlap: an order is either cancellable (pre-ship)
    or refundable (post-ship), not both.

  q34: |
    Import duties are the customer's responsibility, collected by the
    carrier at delivery, and outside Acme Co's control. Refunds don't
    include the original shipping cost (except for damaged-in-transit or
    wrong-item cases); duties are similarly not reimbursed.

  q35: |
    Closing the account immediately forfeits all tier benefits, including
    the Platinum $100 annual store credit, the dedicated customer service
    line, complimentary gift wrapping, and all inherited Gold-tier
    benefits.

  q36: |
    Cancellation is available until the order enters fulfillment-
    processing, typically 2–4 hours after paid_at on weekdays (24 hours
    on weekends). After that, you can no longer cancel; you'd need to
    return the item once it arrives.

  q37: |
    Don't recompute revenue from products.list_price. Sum unit_price *
    quantity from order_items instead — unit_price is the snapshot of
    what customers actually paid, which drifts ±10% from list_price due
    to promotions and per-customer pricing.

  q38: |
    Platinum members receive a 10% loyalty discount on all orders
    (inheriting from Gold), plus all Gold benefits — free expedited
    shipping on orders over $75, free standard shipping over $25, and the
    Silver 5% baseline where applicable.

  q39: |
    Damaged-in-transit cases get a full refund regardless of product
    category. Books have a separate 30-day warranty for printing defects,
    but transit damage is handled under the refund policy: full refund
    plus free return shipping.

  q40: |
    Response time depends on channel: phone is answered within 90 seconds
    during business hours, live chat within 60 seconds, and email gets a
    first response within 4 business hours (full resolution within
    24 business hours for routine issues).

  q41: |
    Orders dispatch from the Ohio fulfillment center. Expedited orders
    placed before 2 PM Eastern ship the same business day; orders after
    2 PM ship the next business day. Standard orders typically dispatch
    within the 3–5 business day delivery window.

  q42: |
    Acme Co does not charge restocking fees — refund amounts are not
    deducted for handling. Return shipping fees may apply on change-of-
    mind returns, but those are separate from restocking.

  q43: |
    Subscription-style food orders — including coffee, granola, and tea —
    exist but are handled outside the standard product catalog; the
    Subscription Operations runbook covers those flows separately.

  q44: |
    Closing your account immediately forfeits all tier benefits.
    Subscription-style orders follow the Loyalty Program cancellation
    rules — they're tied to the customer account, not a separate
    subscription-specific cancellation flow.

  q45: |
    Tier qualification uses trailing 12-month spend, calculated as the
    sum of orders.total minus refunds.amount for orders in paid, shipped,
    or refunded status. Tier is recalculated monthly on the first of the
    month.

  q46: |
    For change-of-mind returns, the customer pays the return shipping.
    The fee is $7.95 for returns under 5 lbs and $14.95 for 5–20 lbs,
    deducted from the refund or charged to the original payment method.

  q47: |
    Refunds to bank accounts (including ACH transfer) typically settle in
    3–5 business days — faster than credit card refunds, which take
    5–7 business days.

  q48: |
    Agents must not request that the negative review be removed or
    modified in exchange for resolution — quid-pro-quo on reviews is
    explicitly forbidden. Resolve the underlying issue first; the customer
    may then choose to update the review on their own.

  q49: |
    A SKU with a return rate above 8% (trailing 90 days) gets flagged to
    the merchandising team for quality review and may be temporarily
    de-listed from the storefront pending investigation. De-listing
    doesn't affect existing orders or open returns for that SKU.

  q50: |
    Gift cards — including digital gift vouchers — are not refundable.
