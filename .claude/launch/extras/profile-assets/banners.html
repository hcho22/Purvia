<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Purvia profile assets</title>
<style>
:root{--paper:#FAFAF7;--ink:#0B1220;--muted:#475569;--faint:#64748B;--pass:#15803D;--fail:#B91C1C;--border:#E2E8F0;
--mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;--body:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
body{margin:0;background:#555;font-family:var(--body)}
.asset{background:var(--paper);color:var(--ink);margin:20px auto;position:relative;overflow:hidden;box-sizing:border-box}
#avatar{width:800px;height:800px;display:flex;align-items:center;justify-content:center}
#avatar svg{width:520px;height:520px}
#x-banner{width:1500px;height:500px;display:flex;align-items:center;padding:0 90px;gap:60px}
#li-banner{width:1584px;height:396px;display:flex;align-items:center;padding:0 80px;gap:56px}
.banner-mark{flex:none}
#x-banner .banner-mark{width:220px;height:220px}
#li-banner .banner-mark{width:180px;height:180px}
.bt .name{font-family:var(--mono);font-weight:650;font-size:64px;letter-spacing:.01em}
.bt .tag{font-size:38px;color:var(--muted);margin-top:8px}
.bt .receipt{font-family:var(--mono);font-size:26px;color:var(--faint);margin-top:26px}
.bt .receipt b{color:var(--pass);font-weight:700}
#li-banner .bt .name{font-size:56px}
#li-banner .bt .tag{font-size:33px}
#li-banner .bt .receipt{font-size:23px;margin-top:20px}
</style></head>
<body>

<div class="asset" id="avatar">
  <svg viewBox="0 0 64 64"><rect x="48" y="12" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="48" y="28" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="12" y="48" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="28" y="48" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="48" y="48" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="6" y="6" width="38" height="38" rx="10" fill="none" stroke="#15803D" stroke-width="3.5"/><rect x="12" y="12" width="10" height="10" rx="2.5" fill="#15803D"/><rect x="28" y="12" width="10" height="10" rx="2.5" fill="#15803D"/><rect x="12" y="28" width="10" height="10" rx="2.5" fill="#15803D"/><rect x="28" y="28" width="10" height="10" rx="2.5" fill="#15803D"/></svg>
</div>

<div class="asset" id="x-banner">
  <svg class="banner-mark" viewBox="0 0 64 64"><rect x="48" y="12" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="48" y="28" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="12" y="48" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="28" y="48" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="48" y="48" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="6" y="6" width="38" height="38" rx="10" fill="none" stroke="#15803D" stroke-width="3.5"/><rect x="12" y="12" width="10" height="10" rx="2.5" fill="#15803D"/><rect x="28" y="12" width="10" height="10" rx="2.5" fill="#15803D"/><rect x="12" y="28" width="10" height="10" rx="2.5" fill="#15803D"/><rect x="28" y="28" width="10" height="10" rx="2.5" fill="#15803D"/></svg>
  <div class="bt">
    <div class="name">purvia</div>
    <div class="tag">The RAG kit that shows its work.</div>
    <div class="receipt">zero-leak table <b>1.000</b> every cell (labeled gold) - 38 nightly snapshots - false-resolve ceiling <b>5%</b> - MIT</div>
  </div>
</div>

<div class="asset" id="li-banner">
  <svg class="banner-mark" viewBox="0 0 64 64"><rect x="48" y="12" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="48" y="28" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="12" y="48" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="28" y="48" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="48" y="48" width="10" height="10" rx="2.5" fill="#94A3B8"/><rect x="6" y="6" width="38" height="38" rx="10" fill="none" stroke="#15803D" stroke-width="3.5"/><rect x="12" y="12" width="10" height="10" rx="2.5" fill="#15803D"/><rect x="28" y="12" width="10" height="10" rx="2.5" fill="#15803D"/><rect x="12" y="28" width="10" height="10" rx="2.5" fill="#15803D"/><rect x="28" y="28" width="10" height="10" rx="2.5" fill="#15803D"/></svg>
  <div class="bt">
    <div class="name">purvia</div>
    <div class="tag">Hardware-validation rigor, applied to RAG.</div>
    <div class="receipt">permissions in the SQL predicate - zero-leak evals in CI - deterministic escalation gates</div>
  </div>
</div>

</body></html>
