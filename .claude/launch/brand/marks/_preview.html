<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Purvia marks preview</title>
<style>
body{margin:0;font-family:ui-monospace,Menlo,monospace;font-size:12px}
.row{display:flex;align-items:center;gap:24px;padding:24px}
.light{background:#FAFAF7;color:#0B1220}
.dark{background:#0B1220;color:#E7EAF0}
img.m64{width:64px;height:64px} img.m16{width:16px;height:16px} img.m24{width:24px;height:24px}
img.lk{height:48px}
</style></head><body>
<div class="row light">
  <img class="m64" src="mark.svg"><img class="m24" src="mark.svg"><img class="m16" src="favicon.svg">
  <img class="lk" src="lockup.svg"><span>light: 64 / 24 / 16(favicon) / lockup</span>
</div>
<div class="row dark">
  <img class="m64" src="mark-dark.svg"><img class="m24" src="mark-dark.svg"><img class="m16" src="favicon.svg">
  <img class="lk" src="lockup-dark.svg"><span>dark: 64 / 24 / 16(favicon) / lockup</span>
</div>
</body></html>
