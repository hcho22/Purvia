# Fly.io deploy config for the FastAPI backend.
# Run `fly launch --copy-config --no-deploy` from `backend/` to create the app,
# then `fly secrets set OPENAI_API_KEY=... SUPABASE_URL=... ...`,
# then `fly deploy`.

app = "agentic-rag-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
