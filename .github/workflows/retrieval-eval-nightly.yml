# US-035: nightly retrieval-eval workflow. Runs the same 50-question
# golden set the PR workflow does, on a schedule (02:00 UTC daily) and on
# manual `workflow_dispatch`. Designed to grow into the "full sweep
# including reranker modes" the PRD calls for — the reranker portion is a
# documented TODO pending a runner extension (see notes inside the run
# step). Today's nightly covers vector / keyword / hybrid against main,
# publishing JSON + markdown snapshots under `docs/nightly/` so the
# repo has a long-running historical record.

name: Retrieval eval (nightly)

on:
  schedule:
    # 02:00 UTC daily — pick a quiet time so the run doesn't compete with
    # PR CI on the same Supabase docker stack.
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  # Need write access to commit the nightly snapshot to docs/nightly/.
  contents: write

concurrency:
  group: retrieval-eval-nightly
  cancel-in-progress: false

jobs:
  nightly:
    name: Full sweep
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # Need the full token to push the nightly snapshot back.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Supabase CLI
        # Pinned to match local dev + retrieval-eval.yml: an unpinned `latest`
        # drifted to a CLI whose default auth key format breaks the eval
        # runner's self-minted JWTs (403). See retrieval-eval.yml for the full
        # rationale; keep these pins in lockstep.
        uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      - name: Start local Supabase stack
        run: |
          supabase start
          supabase status -o env > /tmp/supabase.env
          grep -E '^(API_URL|SERVICE_ROLE_KEY|DB_URL)=' /tmp/supabase.env \
            | sed -E 's/^(.*)="(.*)"$/\1=\2/' \
            >> "$GITHUB_ENV"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r evals/retrieval/requirements.txt

      - name: Seed corpus + run eval
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m db_seed.corpus_seed
          python -m evals.retrieval.runner --out /tmp/nightly.json

      - name: Publish to docs/nightly/
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          mkdir -p docs/nightly
          cp /tmp/nightly.json "docs/nightly/${DATE}.json"
          cp evals/retrieval/summary.md "docs/nightly/${DATE}.md"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/nightly
          if git diff --cached --quiet; then
            echo "no changes to commit — nightly is a no-op against current main"
          else
            git commit -m "chore(evals): nightly retrieval eval ${DATE}"
            git push
          fi

      - name: Reranker observability (hybrid + llm)
        # US-117: nightly reranker observability. Reruns the canonical hybrid
        # path with the `llm` reranker on top (the same
        # backend/main.py:_retrieve_for_agent path production uses), published
        # beside the baseline so the reranker delta is trackable over time.
        # Isolated AFTER the baseline publish with continue-on-error so an
        # OpenAI/infra failure across its ~60 extra serial calls only skips the
        # reranker artifact and NEVER blocks the critical-path baseline publish.
        # cohere/voyage are run manually in the full bake-off — methodology +
        # recommendation in docs/reranker-bakeoff.md.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          mkdir -p docs/nightly
          # Its own --summary avoids clobbering the baseline summary.md.
          python -m evals.retrieval.runner \
            --mode hybrid --viewers full --reranker llm \
            --out "docs/nightly/${DATE}-rerank-llm.json" \
            --summary /tmp/nightly-rerank-llm.md
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/nightly
          if git diff --cached --quiet; then
            echo "no reranker changes to commit — no-op against current main"
          else
            git commit -m "chore(evals): nightly reranker observability ${DATE}"
            git push
          fi
