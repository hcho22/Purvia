# US-035: PR retrieval-eval workflow. Runs the 50-question golden set
# (US-033) against PR head AND main, then posts a delta-vs-main markdown
# comment on the PR. The delta comment is advisory — it never fails the build,
# regardless of delta sign, and updates an existing bot comment in place across
# pushes.
#
# US-009: the PR run additionally executes the E6 second-workspace zero-leak
# eval (--include-e6), which IS a hard gate: a DETECTED cross-workspace leak (or
# a structurally blind positive control) fails the eval step and blocks the
# merge. E6 is a pinned security invariant (CONTEXT E8), so a real leak VERDICT
# is allowed to block per-PR — unlike the LLM-judged quality metrics, which only
# ever comment here. A DETERMINISTIC E6 failure (e.g. an empty/mis-seeded corpus
# or a deterministic 4xx) also BLOCKS: it is reproducible, so it can't flake and
# keeps failing until fixed — but the runner writes the E4 results + summary
# FIRST, then exits 1, so E4 output is never discarded. A transient EXECUTION
# failure (E6 makes ~300 live OpenAI + DB calls) is a different thing: it is
# retried with backoff, then surfaced loudly but NON-BLOCKING, so an infra blip
# can't fail-block an innocent PR.
#
# US-059: the PR run ALSO executes the E7 escalation tripwire — the DETERMINISTIC
# deflection-pipeline legs only (P1a retrieval-gate decisions + the P1b no-access
# replay + the US-058 P1b non-disclosure byte-equality assertion), reusing this
# job's already-seeded corpus + Supabase stack. Like E6 it is a HARD gate: a
# P1a/P1b row that clears the retrieval gate (a retrieval-leg false-resolve / a
# gold leak to a no-access viewer) or a non-disclosure byte mismatch exits the
# runner non-zero and blocks the merge. It is pure arithmetic on cosine scores —
# NO LLM judge — so a real verdict can't flake. The LLM-judged P2/P3 deflection
# sweep is deliberately NOT here (it lives in escalation-eval-weekly.yml); a judge
# wobble must never red-bar an innocent merge.
#
# Reranker modes (cohere / voyage / llm) are NOT exercised here — they
# cost real money per call and add API-dependency flake to PR checks.
# The nightly workflow (retrieval-eval-nightly.yml) is where rerankers
# eventually land once the runner gains reranker support.
#
# US-042: the runner now walks 50 questions × 3 modes × 3 viewers ×
# 2 filter strategies, so the wall-clock budget grows ~3× (each viewer
# adds an extra match_chunks round-trip per question per mode; post-
# filter re-uses the owner ranking). Both PR and main are run, so the
# combined budget is ~6×. timeout-minutes bumped accordingly. Note that
# `main` predates US-042 — its runner doesn't accept `--viewers`, so it
# runs the legacy single-viewer flow; the PR's runner produces the
# richer JSON, and `by_mode` (the canonical full_access × pre_filter
# numbers) is preserved on both sides for diff_results to consume.

name: Retrieval eval (PR)

on:
  pull_request:
    paths:
      - 'backend/retrieval.py'
      - 'backend/chunking.py'
      - 'backend/embeddings.py'
      # US-059: backend/escalation.py owns the deterministic retrieval gate the
      # E7 per-PR tripwire (below) exercises, so a gate change must re-run it.
      - 'backend/escalation.py'
      - 'backend/**/*prompt*'
      - 'evals/retrieval/**'
      - 'db_seed/corpus/**'
      - 'db_seed/corpus_seed.py'
      - 'supabase/migrations/**'
      - '.github/workflows/retrieval-eval.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: retrieval-eval-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  retrieval-eval:
    name: PR vs main
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Checkout main into side directory
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pr/evals/retrieval/requirements-ci.txt

      - name: Install Supabase CLI
        # Pinned, NOT `latest`: a newer Supabase CLI changed the local stack's
        # default auth key format / JWT signing, so the runner's self-minted
        # HS256 JWTs were gateway-rejected (403) on the first match_chunks call
        # — even after sourcing JWT_SECRET/ANON_KEY from `supabase status`
        # (below), because the break is the key *format*, not just its value.
        # 2.90.0 matches local dev, where the eval's auth path is verified
        # working. Bump only alongside a runner update that handles the newer
        # Supabase key formats. Keep the other eval workflows on the same pin.
        uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      - name: Start local Supabase stack
        working-directory: pr
        run: |
          # `supabase start` brings up pgvector + PostgREST + auth + applies
          # all migrations in supabase/migrations/. The PR's migration set
          # is used because we want to eval against the schema the PR ships.
          supabase start
          # Surface the running stack's coordinates to subsequent steps.
          # `-o env` emits `KEY="value"` pairs; strip quotes for $GITHUB_ENV.
          #
          # ANON_KEY + JWT_SECRET are surfaced (alongside API_URL /
          # SERVICE_ROLE_KEY / DB_URL) so the eval authenticates against THIS
          # instance's actual credentials rather than the runner's hardcoded
          # local-dev fallbacks. The runner mints the per-viewer authenticated
          # JWTs with SUPABASE_JWT_SECRET (falling back to a baked-in local
          # secret) and sends SUPABASE_ANON_KEY as the PostgREST `apikey` for
          # those user-JWT requests (falling back to the privileged
          # service-role key). Those fallbacks only line up when the running
          # `supabase start` default secret/keys match the baked-in constants;
          # an UNPINNED CLI can ship a different default JWT secret or key
          # format, after which the very first authenticated match_chunks call
          # is gateway-rejected (403) and the eval crashes. The CLI is now
          # pinned (above) to dodge that drift; sourcing from `supabase status`
          # stays as defense so a future pin bump can't silently desync auth.
          supabase status -o env > /tmp/supabase.env
          grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY|JWT_SECRET|DB_URL)=' /tmp/supabase.env \
            | sed -E 's/^(.*)="(.*)"$/\1=\2/' \
            >> "$GITHUB_ENV"

      - name: Install Python deps (from PR)
        working-directory: pr
        run: |
          # Slim install: backend/requirements.txt drags in torch +
          # transformers + docling and exceeds the runner's disk budget.
          # requirements-ci.txt lists only what runner.py / corpus_seed.py /
          # diff_results.py import on the retrieval-only path (no
          # --include-generation in CI). See requirements-ci.txt comments.
          python -m pip install --upgrade pip
          pip install -r evals/retrieval/requirements-ci.txt

      - name: Seed corpus + run eval (PR)
        working-directory: pr
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          # The eval mints authenticated viewer JWTs and calls match_chunks
          # under them; SUPABASE_JWT_SECRET signs those JWTs and
          # SUPABASE_ANON_KEY is the PostgREST apikey for the user-JWT
          # requests. Both come from the running stack (above) so the eval does
          # not fall back to baked-in local-dev defaults that a newer Supabase
          # may no longer match (the 403-on-first-query failure mode).
          SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ env.JWT_SECRET }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m db_seed.corpus_seed
          # US-042: --viewers all is the default; spelled out here so the
          # workflow log clearly records the run shape. Drops to --viewers
          # full if the new tables are ever too noisy in PR comments.
          #
          # US-009: --include-e6 runs the second-workspace zero-leak eval. It is
          # a PINNED SECURITY INVARIANT (CONTEXT E8 "Security/correctness gate"):
          # a DETECTED cross-workspace leak — or a structurally blind positive
          # control — makes the runner exit non-zero, which FAILS this step and
          # blocks the merge. This leak VERDICT is deliberate and non-downgradable
          # (a fail-the-build behavior in this otherwise comment-only workflow);
          # the delta-vs-main comment below stays advisory. Leak DETECTION is
          # deterministic, so a real verdict is trustworthy — but eval EXECUTION
          # is not: E6 makes ~300 live OpenAI + asyncpg calls, so a transient blip
          # (rate-limit / network / DB) is retried with backoff and then surfaced
          # as a loud but NON-BLOCKING execution error (recorded in the result
          # JSON + summary.md, no exit 1). Thus an infra flake cannot fail-block
          # an innocent PR, mirroring the graceful degradation in
          # backend/test_au4_auth_attacks.py. A DETERMINISTIC E6 failure (e.g. an
          # empty/mis-seeded corpus or a deterministic 4xx) is neither a leak nor
          # a flake: it ALSO exits 1 and blocks — but ONLY after the E4 results
          # JSON + summary.md are written, so E4 output is never discarded.
          python -m evals.retrieval.runner \
            --viewers all --include-e6 --out /tmp/pr.json

      - name: E7 escalation tripwire (PR, deterministic — US-059)
        working-directory: pr
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ env.JWT_SECRET }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # US-059 per-PR tripwire: the DETERMINISTIC escalation legs ONLY — the
          # P1a retrieval-gate decisions (pure arithmetic on the pre-fusion cosine,
          # no LLM), the P1b no-access replay, and the US-058 P1b non-disclosure
          # byte-equality assertion. All three are PINNED `fail`: a P1a/P1b row that
          # clears the retrieval gate (a retrieval-leg false-resolve / a gold leak
          # to a no-access viewer) or a P1b customer output that differs from the
          # generic deferral exits the runner non-zero, FAILS this step, and BLOCKS
          # the merge — exactly like the E6 zero-leak gate above. Leak detection is
          # deterministic, so a real verdict is trustworthy and non-downgradable;
          # the runner writes /tmp/e7-pr.json FIRST, then exits 1, so the detail is
          # never discarded. The consolidated false-resolve ceiling gate (US-059)
          # also runs here but is structurally INERT per-PR — its gated rate is the
          # faithfulness leg (P3), which is not scored here, so it is unmeasured and
          # cannot breach; the retrieval-leg P1a/P1b false-resolves are pinned above.
          #
          # NO --include-p2/--include-p3/--sweep: those draft + call the OFFLINE
          # Claude faithfulness judge, so they are LLM-judged and live in the weekly
          # escalation workflow (escalation-eval-weekly.yml). A judge wobble must
          # never red-bar an innocent merge; the faithfulness-leg false-resolve
          # carries an accepted up-to-a-week detection latency, mitigated by this
          # deterministic retrieval-leg tripwire (docs/evals.md "E7 CI placement").
          # No ANTHROPIC_API_KEY is needed or passed — this runs on the slim
          # requirements-ci.txt env installed above (e7_runner's deterministic path
          # imports only escalation/retrieval, both already on that env).
          #
          # Reuses THIS job's already-seeded corpus + running Supabase stack; the
          # P1b leg rewrites chunk_acl per question via asyncpg (DATABASE_URL), the
          # same E4 reset_viewer_acls machinery the PR eval above already exercised.
          # The main reseed below restores corpus state for the main runner.
          python -m evals.retrieval.e7_runner --include-p1b --out /tmp/e7-pr.json

      - name: Reseed corpus + run eval (main)
        working-directory: main
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          # Same as the PR step: authenticate against the running stack's real
          # secret/anon key rather than baked-in local-dev fallbacks.
          SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ env.JWT_SECRET }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # The main checkout reuses the PR's Python env. If main predates
          # US-032 (no corpus_seed yet), fall back to PR's already-seeded
          # corpus so the main eval still runs against a populated DB —
          # the comparison is then "main code paths vs PR data" which is
          # the meaningful question for retrieval-touching PRs anyway.
          if [ -f db_seed/corpus_seed.py ]; then
            python -m db_seed.corpus_seed
          else
            echo "main lacks db_seed/corpus_seed.py — using PR's seed in place"
          fi
          python -m evals.retrieval.runner --out /tmp/main.json

      - name: Render delta-vs-main markdown comment
        working-directory: pr
        run: |
          python -m evals.retrieval.ci.diff_results \
            /tmp/main.json /tmp/pr.json > /tmp/comment.md
          echo "--- comment preview ---"
          cat /tmp/comment.md

      - name: Post / update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/comment.md', 'utf8');
            const marker = '<!-- retrieval-eval-bot-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: existing } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: prior.id, body,
              });
              core.info(`updated existing comment ${prior.id}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
              core.info(`created new comment ${created.id}`);
            }
