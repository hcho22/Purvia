# US-035: PR retrieval-eval workflow. Runs the 50-question golden set
# (US-033) against PR head AND main, then posts a delta-vs-main markdown
# comment on the PR. Comment-only — never fails the build, regardless of
# delta sign. Updates an existing bot comment in place across pushes.
#
# Reranker modes (cohere / voyage / llm) are NOT exercised here — they
# cost real money per call and add API-dependency flake to PR checks.
# The nightly workflow (retrieval-eval-nightly.yml) is where rerankers
# eventually land once the runner gains reranker support.

name: Retrieval eval (PR)

on:
  pull_request:
    paths:
      - 'backend/retrieval.py'
      - 'backend/chunking.py'
      - 'backend/embeddings.py'
      - 'backend/**/*prompt*'
      - 'evals/retrieval/**'
      - 'db_seed/corpus/**'
      - 'db_seed/corpus_seed.py'
      - 'supabase/migrations/**'
      - '.github/workflows/retrieval-eval.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: retrieval-eval-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  retrieval-eval:
    name: PR vs main
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Checkout main into side directory
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pr/backend/requirements.txt

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        working-directory: pr
        run: |
          # `supabase start` brings up pgvector + PostgREST + auth + applies
          # all migrations in supabase/migrations/. The PR's migration set
          # is used because we want to eval against the schema the PR ships.
          supabase start
          # Surface API_URL / SERVICE_ROLE_KEY / DB_URL to subsequent steps.
          # `-o env` emits `KEY="value"` pairs; strip quotes for $GITHUB_ENV.
          supabase status -o env > /tmp/supabase.env
          grep -E '^(API_URL|SERVICE_ROLE_KEY|DB_URL)=' /tmp/supabase.env \
            | sed -E 's/^(.*)="(.*)"$/\1=\2/' \
            >> "$GITHUB_ENV"

      - name: Install Python deps (from PR)
        working-directory: pr
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r evals/retrieval/requirements.txt

      - name: Seed corpus + run eval (PR)
        working-directory: pr
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m db_seed.corpus_seed
          python -m evals.retrieval.runner --out /tmp/pr.json

      - name: Reseed corpus + run eval (main)
        working-directory: main
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # The main checkout reuses the PR's Python env. If main predates
          # US-032 (no corpus_seed yet), fall back to PR's already-seeded
          # corpus so the main eval still runs against a populated DB —
          # the comparison is then "main code paths vs PR data" which is
          # the meaningful question for retrieval-touching PRs anyway.
          if [ -f db_seed/corpus_seed.py ]; then
            python -m db_seed.corpus_seed
          else
            echo "main lacks db_seed/corpus_seed.py — using PR's seed in place"
          fi
          python -m evals.retrieval.runner --out /tmp/main.json

      - name: Render delta-vs-main markdown comment
        working-directory: pr
        run: |
          python -m evals.retrieval.ci.diff_results \
            /tmp/main.json /tmp/pr.json > /tmp/comment.md
          echo "--- comment preview ---"
          cat /tmp/comment.md

      - name: Post / update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/comment.md', 'utf8');
            const marker = '<!-- retrieval-eval-bot-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: existing } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: prior.id, body,
              });
              core.info(`updated existing comment ${prior.id}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
              core.info(`created new comment ${created.id}`);
            }
