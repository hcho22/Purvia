# US-043: nightly permissions-scale benchmark.
#
# Runs the wikipedia 10k-chunk corpus + the ef_search sweep across three
# permission selectivities (50% / 10% / 1%). The eval is the empirical
# backing for the HNSW selectivity story in docs/permissions-aware-rag.md
# (US-044). Comment + dashboard rather than blocking PR check — the
# runtime (~3 min seed + ~3 min eval) and the OpenAI embedding cost
# (~$0.10 per seed) make it a nightly job, not a per-PR one.
#
# Failure semantics: the runner is invoked with --enforce-floor, so it
# exits non-zero if recall@5 at (selectivity=1%, ef_search=40) drops
# below the floor configured in scale_gold.yaml::recall_floor. The floor
# is intentionally loose at v0 (0.10) — the recall *collapse* is the
# whole point of the eval, so the alarm is "we still retrieve something",
# not "we retrieve everything". Tighten once three nightlies have run
# and a stable baseline is visible (PRD open question).
#

name: Permissions scale eval (nightly)

on:
  schedule:
    # 03:00 UTC daily — staggered an hour past the retrieval-eval nightly
    # so the two don't compete for the same Supabase docker stack on the
    # GitHub-hosted runner.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  # Need write access to push the nightly snapshot under
  # docs/permissions-scale-nightly/.
  contents: write

concurrency:
  group: permissions-scale-eval-nightly
  cancel-in-progress: false

jobs:
  scale:
    name: Wikipedia 10k + ef_search sweep
    runs-on: ubuntu-latest
    # Budget breakdown: seed ≈ 3 min (HF download + embedding 10k chunks
    # via OpenAI), eval ≈ 3 min (15 questions × 3 viewers × 4 ef_search
    # = 180 RPC calls), plus Supabase boot. 30-minute ceiling leaves
    # plenty of headroom for slow-day OpenAI / HuggingFace.
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: evals/permissions_scale/requirements.txt

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: |
          # Brings up pgvector + PostgREST + auth + applies migrations.
          # The HNSW index on chunks.embedding is created by the same
          # migration the production schema uses, so the ef_search knob
          # behaves identically here to a real deployment.
          supabase start
          supabase status -o env > /tmp/supabase.env
          grep -E '^(API_URL|SERVICE_ROLE_KEY|DB_URL)=' /tmp/supabase.env \
            | sed -E 's/^(.*)="(.*)"$/\1=\2/' \
            >> "$GITHUB_ENV"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r evals/permissions_scale/requirements.txt

      - name: Seed wikipedia corpus
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Pinning here so the dataset is reproducible across runs even
          # if Salesforce/wikitext's main branch moves. Bump after the
          # first successful nightly resolves a SHA into the summary.
          WIKITEXT_REVISION: main
        run: |
          python -m db_seed.wikipedia_seed

      - name: Run scale eval
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # --enforce-floor: exit non-zero if the recall_floor cell in
          # scale_gold.yaml drops below threshold. This is the only
          # failure path; dataset-fetch / seed errors fall through the
          # `set -e` shell default and also fail the job.
          python -m evals.permissions_scale.runner \
            --out /tmp/scale.json \
            --enforce-floor

      - name: Publish to docs/permissions-scale-nightly/
        # Always publish, even when --enforce-floor failed the previous
        # step — the snapshot is the *evidence* of the failure and is
        # more useful committed than discarded. `if: always()` runs the
        # step when the job has failed, then we let the job's overall
        # exit code reflect the eval's verdict.
        if: always()
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          mkdir -p docs/permissions-scale-nightly
          # The run may not have produced /tmp/scale.json if seed failed
          # — guard the copy so the publish step itself doesn't crash.
          if [ -f /tmp/scale.json ]; then
            cp /tmp/scale.json "docs/permissions-scale-nightly/${DATE}.json"
          fi
          if [ -f evals/permissions_scale/summary.md ]; then
            cp evals/permissions_scale/summary.md \
               "docs/permissions-scale-nightly/${DATE}.md"
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/permissions-scale-nightly || true
          if git diff --cached --quiet; then
            echo "no changes to commit — nightly produced no artifact"
          else
            git commit -m "chore(evals): permissions scale nightly ${DATE}"
            git push
          fi
