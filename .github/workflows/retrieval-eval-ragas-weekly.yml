# US-008: weekly RAGAS-eval workflow. Runs the four canonical RAGAS metrics
# (Faithfulness, Answer Relevancy, Context Precision, Context Recall) over the
# 50-question golden set on the two hybrid pre_filter cells, on a weekly
# schedule (Sundays 04:00 UTC) and on manual `workflow_dispatch`. It keeps its
# own concurrency group and snapshot directory so it never tangles with the
# daily nightly retrieval workflow.
#
# Snapshots land under `docs/ragas-weekly/<DATE>.{json,md}` — the rolling
# history the diagnostic / score-regression gates (US-006 / US-007) compare
# against. A red gate finding (US-005 operational, or a US-007 corroborated
# score regression) makes the runner exit non-zero; this workflow then files
# one GitHub issue per finding tag and fails so a maintainer is paged. A green
# scheduled run auto-closes stale operational issues.

name: RAGAS eval (weekly)

on:
  schedule:
    # 04:00 UTC Sundays — off-peak vs the daily nightly's 02:00 UTC so the two
    # never compete for the same Supabase docker stack.
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  # contents: write — commit the weekly snapshot to docs/ragas-weekly/.
  # issues: write — file / close gate-finding issues.
  contents: write
  issues: write

concurrency:
  group: retrieval-eval-ragas-weekly
  cancel-in-progress: false

jobs:
  weekly-ragas:
    name: Weekly RAGAS sweep
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # Need the full token to push the weekly snapshot back.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Supabase CLI
        # Pinned to match local dev + retrieval-eval.yml: an unpinned `latest`
        # drifted to a CLI whose default auth key format breaks the eval
        # runner's self-minted JWTs (403). See retrieval-eval.yml for the full
        # rationale; keep these pins in lockstep.
        uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      - name: Start local Supabase stack
        run: |
          supabase start
          supabase status -o env > /tmp/supabase.env
          grep -E '^(API_URL|SERVICE_ROLE_KEY|DB_URL)=' /tmp/supabase.env \
            | sed -E 's/^(.*)="(.*)"$/\1=\2/' \
            >> "$GITHUB_ENV"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # requirements.txt (not requirements-ci.txt) so `ragas` +
          # `langchain-openai` are present for the --include-ragas path.
          pip install -r evals/retrieval/requirements.txt

      - name: Seed corpus + run RAGAS eval
        id: ragas
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          CORPUS_SEED_DATABASE_URL: ${{ env.DB_URL }}
          DATABASE_URL: ${{ env.DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m db_seed.corpus_seed
          # `--viewers partial` expands to (full_access, partial_access) — the
          # two cells RAGAS scores; the runner has no comma-list viewer
          # syntax. `--summary` points at /tmp so the default
          # evals/retrieval/summary.md (the nightly retrieval artifact) is
          # left untouched. The runner exits 1 on a red gate finding but
          # writes the JSON + summary first, so the snapshot is always
          # publishable — capture the code rather than letting it abort.
          set +e
          python -m evals.retrieval.runner \
            --include-generation --include-ragas \
            --mode hybrid --viewers partial \
            --out /tmp/ragas-weekly.json --summary /tmp/ragas-weekly.md
          code=$?
          set -e
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "runner exited ${code}"

      - name: Publish to docs/ragas-weekly/
        if: always()
        run: |
          if [ ! -f /tmp/ragas-weekly.json ]; then
            echo "runner produced no snapshot — nothing to publish"
            exit 0
          fi
          DATE=$(date -u +"%Y-%m-%d")
          mkdir -p docs/ragas-weekly
          cp /tmp/ragas-weekly.json "docs/ragas-weekly/${DATE}.json"
          cp /tmp/ragas-weekly.md "docs/ragas-weekly/${DATE}.md"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/ragas-weekly
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(evals): weekly RAGAS eval ${DATE}"
            git push
          fi

      - name: File / close gate-finding issues
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_EXIT: ${{ steps.ragas.outputs.exit_code }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ ! -f /tmp/ragas-weekly.json ]; then
            echo "no snapshot — skipping issue management"
            exit 0
          fi
          if [ "${RUNNER_EXIT}" != "0" ]; then
            # Red gate finding(s): file one issue per tag, deduped against an
            # open issue already carrying that label.
            tags=$(jq -r '.ragas.gate_findings // []
              | map(select(.severity == "red")) | map(.tag) | unique | .[]' \
              /tmp/ragas-weekly.json)
            for tag in ${tags}; do
              gh label create "${tag}" --color B60205 \
                --description "RAGAS weekly gate finding" --force || true
              open=$(gh issue list --label "${tag}" --state open \
                --json number --jq 'length')
              if [ "${open}" = "0" ]; then
                body=$(jq -r --arg t "${tag}" '.ragas.gate_findings
                  | map(select(.tag == $t))
                  | map("- " + .message) | join("\n")' /tmp/ragas-weekly.json)
                gh issue create --label "${tag}" \
                  --title "RAGAS weekly gate: ${tag}" \
                  --body "${body}"
                echo "filed issue for ${tag}"
              else
                echo "open issue already exists for ${tag} — dedup, skipping"
              fi
            done
          elif [ "${EVENT_NAME}" = "schedule" ]; then
            # Green scheduled run: auto-close stale operational issues. Only a
            # scheduled run auto-closes — a manual dispatch may be a partial
            # re-run and must not clear a still-real finding.
            for tag in coverage-pipeline-failure coverage-operational-failure; do
              for num in $(gh issue list --label "${tag}" --state open \
                --json number --jq '.[].number'); do
                gh issue close "${num}" \
                  --comment "Auto-closed: the scheduled weekly RAGAS run was green (no ${tag})."
                echo "auto-closed issue #${num} (${tag})"
              done
            done
          fi

      - name: Reflect runner exit code
        if: always() && steps.ragas.outputs.exit_code == '1'
        run: |
          echo "RAGAS runner exited 1 — a red gate finding fired."
          echo "Findings have been filed as GitHub issues; failing the workflow."
          exit 1
